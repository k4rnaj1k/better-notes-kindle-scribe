name: Build BetterNotes

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      TARGET: kindlehf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential autoconf automake bison flex gawk \
            libtool libtool-bin libncurses-dev \
            curl file git gperf help2man texinfo unzip wget \
            libarchive-dev nettle-dev \
            meson libgtk2.0-dev libxrandr-dev \
            pkg-config python3

      - name: Restore cached cross-compilation toolchain
        id: cache-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ~/x-tools
          key: kindle-toolchain-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            kindle-toolchain-

      - name: Build koxtoolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth=1 \
            https://github.com/koreader/koxtoolchain.git /tmp/koxtoolchain
          cd /tmp/koxtoolchain
          chmod +x ./gen-tc.sh
          ./gen-tc.sh $TARGET

      - name: Build kindle-sdk
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth=1 \
            https://github.com/KindleModding/kindle-sdk.git /tmp/kindle-sdk
          cd /tmp/kindle-sdk
          export PATH="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/bin:$PATH"
          chmod +x ./gen-sdk.sh
          ./gen-sdk.sh $TARGET

      - name: Copy XRandR headers into sysroot
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          SYSROOT="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/arm-${TARGET}-linux-gnueabihf/sysroot"
          sudo mkdir -p "$SYSROOT/usr/include/X11/extensions"
          sudo cp /usr/include/X11/extensions/Xrandr.h "$SYSROOT/usr/include/X11/extensions/"
          sudo cp /usr/include/X11/extensions/randr.h  "$SYSROOT/usr/include/X11/extensions/"

      - name: Make toolchain writable by runner user
        run: |
          # The sysroot (and parts of the toolchain) end up root-owned AND
          # with read-only dir perms (mode 555) after gen-tc.sh / gen-sdk.sh,
          # and that's preserved by the toolchain cache. Hand ownership back
          # to the runner AND add the write bit, otherwise the OCR/FBInk cache
          # restores can't mkdir inside sysroot/usr/include (the "Cannot
          # mkdir: Permission denied" tar failure) and `make install` can't
          # write there either.
          sudo chown -R "$(id -u):$(id -g)" "$HOME/x-tools"
          sudo chmod -R u+rwX "$HOME/x-tools"

      - name: Save toolchain cache
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/x-tools
          key: kindle-toolchain-${{ hashFiles('Dockerfile') }}

      - name: Restore cached tesseract/leptonica
        id: cache-ocr
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/x-tools-extra
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/leptonica
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/tesseract
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libleptonica.*
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libtesseract.*
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/lept.pc
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/tesseract.pc
          key: ocr-${{ hashFiles('deps/build-tesseract.sh') }}

      - name: Build leptonica + tesseract for ${{ env.TARGET }}
        if: steps.cache-ocr.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/bin:$PATH"
          export SYSROOT="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/arm-${TARGET}-linux-gnueabihf/sysroot"
          bash deps/build-tesseract.sh

      - name: Save tesseract/leptonica cache
        if: steps.cache-ocr.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/x-tools-extra
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/leptonica
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/tesseract
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libleptonica.*
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libtesseract.*
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/lept.pc
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/tesseract.pc
          key: ocr-${{ hashFiles('deps/build-tesseract.sh') }}

      - name: Restore cached FBInk
        id: cache-fbink
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/fbink.h
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libfbink.a
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/fbink.pc
          key: fbink-${{ hashFiles('deps/build-fbink.sh') }}

      - name: Build FBInk for ${{ env.TARGET }}
        if: steps.cache-fbink.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/bin:$PATH"
          export SYSROOT="$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/arm-${TARGET}-linux-gnueabihf/sysroot"
          bash deps/build-fbink.sh

      - name: Save FBInk cache
        if: steps.cache-fbink.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/include/fbink.h
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/libfbink.a
            ~/x-tools/arm-kindlehf-linux-gnueabihf/arm-kindlehf-linux-gnueabihf/sysroot/usr/lib/pkgconfig/fbink.pc
          key: fbink-${{ hashFiles('deps/build-fbink.sh') }}

      - name: Set env
        run: |
          echo "MESON_CROSS=$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/meson-crosscompile.txt" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-${TARGET}-linux-gnueabihf/bin" >> $GITHUB_PATH

      - name: Build betternotes
        run: |
          rm -rf builddir_kindle
          meson setup --cross-file "$MESON_CROSS" builddir_kindle
          meson compile -C builddir_kindle

      - name: Stage KUAL extension
        run: |
          mkdir -p dist/extensions/betternotes/bin
          cp builddir_kindle/betternotes dist/extensions/betternotes/bin/
          cp kual/betternotes/config.xml kual/betternotes/menu.json \
             dist/extensions/betternotes/
          cp -r kual/betternotes/bin/* dist/extensions/betternotes/bin/ || true
          # Bundle eng.traineddata when present (skipped on first scaffolded run)
          if [ -f ~/x-tools-extra/share/tessdata/eng.traineddata ]; then
            mkdir -p dist/extensions/betternotes/data
            cp ~/x-tools-extra/share/tessdata/eng.traineddata \
               dist/extensions/betternotes/data/
          fi
          tar -czf betternotes-${{ github.sha }}.tar.gz -C dist extensions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: betternotes-${{ github.sha }}
          path: betternotes-${{ github.sha }}.tar.gz
